name: build

on:
  push:
  pull_request:

jobs:
  build-unix:
    name: build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-26
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler + transpiler + interpreter
        run: make all
      - name: Smoke test compiler + transpiler
        run: |
          ./sub tests/test_simple.sb linux
          test -f test_simple.c
      - name: Build interpreter
        run: make interpreter
      - name: Smoke test interpreter
        run: |
          echo 'var x = 10' > /tmp/test_interp.sb
          echo 'print(x)' >> /tmp/test_interp.sb
          ./subi /tmp/test_interp.sb

  build-windows:
    name: build (windows / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
          msystem: MINGW64
      - name: Build all tools
        shell: msys2 {0}
        run: make all
      - name: Smoke test compiler + transpiler
        shell: msys2 {0}
        run: |
          ./sub.exe tests/test_simple.sb linux
          test -f test_simple.c
      - name: Smoke test interpreter
        shell: msys2 {0}
        run: |
          echo 'var x = 10' > test_interp.sb
          echo 'print(x)' >> test_interp.sb
          ./subi.exe test_interp.sb
